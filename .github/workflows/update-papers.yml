name: Update NBER papers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 2"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update paper data
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: python scripts/update_papers.py --require-api-key

      - name: Commit data changes
        run: |
          if git diff --quiet -- src/data; then
            echo "No data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/papers.json src/data/update-meta.json src/data/archive.json src/data/translation-cache.json
          git commit -m "data: update weekly NBER papers"
          git push

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install Node dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
